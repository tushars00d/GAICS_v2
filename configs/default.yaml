# Default Configuration for 5-Layer Architecture - Scaled Research Pipeline

data:
  dataset_name: "nsl-kdd" 
  batch_size: 1024
  train_split: 0.8
  num_workers: 2
  pin_memory: true
  mock_samples: 100000 # Scale dataset up to 100k samples

layer1_ddpm:
  num_timesteps: 1000
  beta_schedule: "linear"
  hidden_dims: [256, 512, 256]
  learning_rate: 1e-4
  epochs: 100
  fp16: true

layer2_ids:
  hidden_dims: [256, 128, 64]
  num_heads: 4
  learning_rate: 1e-4
  epochs: 50
  focal_loss_gamma: 2.0
  focal_loss_alpha: 0.25
  fgsm_epsilon: 0.1
  purification_steps: 100
  fp16: true
  gradient_clip: 1.0

layer3_agents:
  llm_provider: "local" 
  model_name: "gpt-3.5-turbo"
  temperature: 0.0

layer4_response:
  confidence_threshold: 0.85
  simulate_soar: true

evaluation:
  num_seeds: 5
  mlflow_experiment_name: "GAICS_Dissertation_Scaled"
