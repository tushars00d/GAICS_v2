# Default Configuration for 5-Layer Architecture

data:
  dataset_name: "nsl-kdd" # Options: nsl-kdd, cicids-2017
  batch_size: 256
  train_split: 0.8

layer1_ddpm:
  num_timesteps: 1000
  beta_schedule: "linear" # Options: linear, cosine
  hidden_dims: [256, 512, 256]
  learning_rate: 1e-4
  epochs: 50

layer2_ids:
  hidden_dims: [128, 64]
  num_heads: 4
  learning_rate: 1e-4
  epochs: 30
  focal_loss_gamma: 2.0
  focal_loss_alpha: 0.25
  fgsm_epsilon: 0.1
  purification_steps: 100

layer3_agents:
  llm_provider: "local" # Options: local (dummy), openai
  model_name: "gpt-3.5-turbo"
  temperature: 0.0

layer4_response:
  confidence_threshold: 0.85
  simulate_soar: true

evaluation:
  num_seeds: 5
  mlflow_experiment_name: "GAICS_Dissertation"
